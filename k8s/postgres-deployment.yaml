apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: centos/postgresql-13-centos7
        env:
        - name: POSTGRESQL_USER
          value: "vorleser_user"
        - name: POSTGRESQL_PASSWORD
          value: "secretpassword"
        - name: POSTGRESQL_DATABASE
          value: "vorleser_db"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/pgsql/data
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  ports:
  - port: 5432
  selector:
    app: db