name: Trigger OKD Build

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies and Pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -r maulwurf/requirements.txt
          pip install -r leseratte/requirements.txt
          pip install -r papagei/requirements.txt
          pip install -r klammeraffe/requirements.txt

      - name: Run Pylint for maulwurf
        run: |
          pylint maulwurf/app.py

      - name: Run Pylint for leseratte
        run: |
          pylint leseratte/app.py

      - name: Run Pylint for papagei
        run: |
          pylint papagei/app.py

      - name: Run Pylint for maulwurf
        run: |
          pylint maulwurf/app.py

      - name: Run Pylint for klammeraffe
        run: |
          pylint klammeraffe/app.py

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r maulwurf/requirements.txt

      - name: Run tests
        working-directory: ./maulwurf
        env:
          STORAGE_DIR: /tmp/vorleser_storage_test
        run: |
          python -W ignore::ResourceWarning -m unittest test_app.py

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

      - name: Login to OKD
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: https://api.okd.fured.cloud.bme.hu:6443
          openshift_token: ${{ secrets.OKD_TOKEN }}
          namespace: vorleser

      - name: Apply Infrastructure and Networking
        run: |
          oc apply -f k8s/postgres-pvc.yaml
          oc apply -f k8s/blob-storage-pvc.yaml

          oc apply -f k8s/postgres-deployment.yaml
          oc apply -f k8s/rabbitmq-deplyoment.yaml
          oc apply -f k8s/blob-storage-deployment.yaml
          oc apply -f k8s/ocr-worker-deployment.yaml
          oc apply -f k8s/frontend-deployment.yaml
          oc apply -f k8s/notification-deployment.yaml

      - name: Start Builds
        run: |
          oc start-build vorleser-maulwurf
          oc start-build vorleser-leseratte
          oc start-build vorleser-papagei
          oc start-build vorleser-klammeraffe

      - name: Trigger Rollout (Refresh Deployments)
        run: |
          # We need to restart the deployments to make them pick up the new images built by OKD
          oc rollout restart deployment/vorleser-maulwurf
          oc rollout restart deployment/vorleser-leseratte
          oc rollout restart deployment/vorleser-papagei
          oc rollout restart deployment/vorleser-klammeraffe