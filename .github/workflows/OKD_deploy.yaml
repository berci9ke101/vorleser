name: Trigger OKD Build

on:
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies and Pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -r maulwurf/requirements.txt

      - name: Run Pylint for maulwurf
        run: |
          pylint maulwurf/app.py

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r maulwurf/requirements.txt

      - name: Run tests
        run: |
          python -W ignore::ResourceWarning -m unittest test_app.py

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

      - name: Login to OKD
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: https://api.okd.fured.cloud.bme.hu:6443
          openshift_token: ${{ secrets.OKD_TOKEN }}
          namespace: vorleser

      - name: Start maulwurf Build
        run: oc start-build vorleser-maulwurf